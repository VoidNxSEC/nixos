name: SBOM

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CACHIX_CACHE_NAME: ${{ vars.CACHIX_CACHE_NAME }}

jobs:
  syft:
    name: Generate SBOM (CycloneDX)
    runs-on: [self-hosted, nixos]
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-nix-env
        with:
          cachix-name: ${{ env.CACHIX_CACHE_NAME }}
          cachix-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build system closure
        id: build
        run: |
          STORE_PATH=$(nix build \
            .#nixosConfigurations.kernelcore.config.system.build.toplevel \
            --no-link --print-out-paths)
          echo "path=$STORE_PATH" >> $GITHUB_OUTPUT

      - uses: anchore/sbom-action@v0
        with:
          path: ${{ steps.build.outputs.path }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          artifact-name: sbom-${{ github.sha }}.cyclonedx.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cyclonedx.json
          retention-days: 90
