name: Vulnerability Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  security-events: write

env:
  CACHIX_CACHE_NAME: ${{ vars.CACHIX_CACHE_NAME }}

jobs:
  grype:
    name: Grype
    runs-on: [self-hosted, nixos]
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-nix-env
        with:
          cachix-name: ${{ env.CACHIX_CACHE_NAME }}
          cachix-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build system closure
        id: build
        run: |
          STORE_PATH=$(nix build \
            .#nixosConfigurations.kernelcore.config.system.build.toplevel \
            --no-link --print-out-paths)
          echo "path=$STORE_PATH" >> $GITHUB_OUTPUT

      - name: Grype scan
        uses: anchore/scan-action@v3
        id: scan
        with:
          path: ${{ steps.build.outputs.path }}
          output-format: sarif
          severity-cutoff: high
          fail-build: false

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: grype
