name: Update Flake Lock

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  CACHIX_CACHE_NAME: ${{ vars.CACHIX_CACHE_NAME }}

jobs:
  update:
    name: Update flake.lock
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup-nix-env
        with:
          cachix-name: ${{ env.CACHIX_CACHE_NAME }}
          cachix-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Update flake inputs
        run: nix flake update

      - name: Validate updated lockfile
        run: nix flake check --show-trace

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: peter-evans/create-pull-request@v6
        if: steps.diff.outputs.changed == 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/update-flake-lock
          commit-message: 'chore(flake): update flake.lock'
          title: 'chore(flake): weekly flake.lock update'
          body: |
            Automated weekly update of `flake.lock`.

            Validation run: `nix flake check --show-trace`
          labels: dependencies,automated
          delete-branch: true
